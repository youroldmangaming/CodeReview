<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CodeReview.</title>
<meta name="description" content="A free, self-contained static code analysis tool for JavaScript, TypeScript, Python, Java, and HTML. Runs 100% locally — no data leaves your browser."/>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg:#0c0c0e; --surface:rgba(255,255,255,0.025); --border:rgba(255,255,255,0.07);
    --accent:#4ec9b0; --accent2:#3aa88e; --text:#e2e2e2;
    --muted:rgba(255,255,255,0.35); --dim:rgba(255,255,255,0.18);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{min-height:100vh;background:var(--bg);color:var(--text);font-family:'JetBrains Mono',monospace;overflow-x:hidden;}
  body::before{content:'';position:fixed;inset:0;z-index:0;background-image:linear-gradient(rgba(255,255,255,0.017) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.017) 1px,transparent 1px);background-size:44px 44px;pointer-events:none;}
  body::after{content:'';position:fixed;left:0;right:0;height:2px;z-index:0;background:linear-gradient(90deg,transparent,rgba(78,201,176,0.14),transparent);animation:scan 9s linear infinite;pointer-events:none;}
  .wrap{position:relative;z-index:1;max-width:1060px;margin:0 auto;padding:38px 22px 60px;}
  .header{margin-bottom:28px;}
  .header-badge{display:flex;align-items:center;gap:10px;margin-bottom:7px;}
  .dot{width:7px;height:7px;border-radius:50%;background:var(--accent);box-shadow:0 0 10px var(--accent);animation:pulse 2s ease-in-out infinite;}
  .badge-text{font-size:10px;letter-spacing:0.22em;color:var(--dim);}
  .logo{font-family:'Syne',sans-serif;font-size:clamp(26px,5vw,48px);font-weight:800;letter-spacing:-0.02em;background:linear-gradient(135deg,#fff 0%,rgba(255,255,255,0.4) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1;}
  .logo span{-webkit-text-fill-color:var(--accent);}
  .tagline{margin-top:6px;font-size:11px;color:var(--dim);letter-spacing:0.05em;}
  .lang-row{display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap;}
  .lang-label{font-size:9px;letter-spacing:0.18em;color:var(--dim);white-space:nowrap;}
  .lang-btn{padding:5px 14px;background:var(--surface);border:1px solid var(--border);border-radius:20px;color:var(--dim);font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:0.08em;cursor:pointer;transition:all 0.2s;}
  .lang-btn:hover{border-color:rgba(78,201,176,0.3);color:rgba(255,255,255,0.5);}
  .lang-btn.active{background:rgba(78,201,176,0.12);border-color:rgba(78,201,176,0.45);color:var(--accent);}
  .lang-detected{font-size:9px;letter-spacing:0.12em;color:rgba(78,201,176,0.7);padding:5px 12px;border:1px dashed rgba(78,201,176,0.3);border-radius:20px;}
  #input-panel{animation:fadeUp 0.4s ease both;}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px;}
  .field-label{display:block;font-size:9px;letter-spacing:0.2em;color:var(--dim);margin-bottom:8px;text-transform:uppercase;}
  textarea{width:100%;height:370px;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:14px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:12px;line-height:1.75;resize:vertical;transition:border-color 0.2s;outline:none;}
  textarea:focus{border-color:rgba(78,201,176,0.35);}
  textarea.has-value{border-color:rgba(78,201,176,0.28);}
  textarea::placeholder{color:rgba(255,255,255,0.13);}
  .btn-analyze{width:100%;padding:15px;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:8px;color:#0c0c0e;font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;letter-spacing:0.14em;cursor:pointer;transition:all 0.2s;box-shadow:0 0 24px rgba(78,201,176,0.22);}
  .btn-analyze:disabled{background:rgba(255,255,255,0.04);color:rgba(255,255,255,0.16);box-shadow:none;cursor:not-allowed;}
  .btn-analyze:not(:disabled):hover{box-shadow:0 0 36px rgba(78,201,176,0.35);transform:translateY(-1px);}
  #result-panel{display:none;animation:fadeUp 0.45s ease both;}
  .result-topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;}
  .result-topbar-left{display:flex;align-items:center;gap:12px;}
  .result-topbar-left>span{font-size:9px;letter-spacing:0.22em;color:var(--dim);}
  .lang-pill{font-size:9px;letter-spacing:0.12em;padding:3px 10px;border-radius:10px;font-weight:700;}
  .btn-back{background:var(--surface);border:1px solid var(--border);border-radius:6px;color:var(--muted);padding:6px 14px;font-family:'JetBrains Mono',monospace;font-size:10px;cursor:pointer;letter-spacing:0.08em;transition:all 0.2s;}
  .btn-back:hover{border-color:rgba(78,201,176,0.35);color:var(--accent);}
  .score-card{display:grid;grid-template-columns:auto 1fr;gap:26px;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:24px;margin-bottom:14px;}
  .score-ring-wrap{display:flex;flex-direction:column;align-items:center;gap:6px;}
  .ring-svg{transform:rotate(-90deg);}
  .ring-bg{fill:none;stroke:rgba(255,255,255,0.05);stroke-width:7;}
  .ring-fg{fill:none;stroke-width:7;stroke-linecap:round;transition:stroke-dashoffset 1.2s cubic-bezier(0.4,0,0.2,1),stroke 0.3s;}
  .ring-inner{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
  .ring-score{font-size:26px;font-weight:700;line-height:1;}
  .ring-denom{font-size:9px;color:var(--dim);letter-spacing:0.08em;}
  .ring-grade{font-size:18px;font-weight:700;margin-top:3px;}
  .ring-label{font-size:9px;letter-spacing:0.14em;color:var(--dim);}
  .score-right{border-left:1px solid var(--border);padding-left:24px;}
  .section-label{font-size:9px;letter-spacing:0.18em;color:var(--dim);margin-bottom:8px;}
  .summary-text{font-size:12px;line-height:1.7;color:rgba(255,255,255,0.58);margin-bottom:20px;}
  .dim-bar{margin-bottom:11px;}
  .dim-bar-top{display:flex;justify-content:space-between;margin-bottom:4px;}
  .dim-name{font-size:10px;color:rgba(255,255,255,0.45);letter-spacing:0.04em;}
  .dim-score{font-size:10px;font-weight:700;}
  .dim-track{height:3px;background:rgba(255,255,255,0.06);border-radius:2px;overflow:hidden;}
  .dim-fill{height:100%;border-radius:2px;width:0%;transition:width 0.75s cubic-bezier(0.4,0,0.2,1);}
  .tabs{display:flex;gap:4px;margin-bottom:12px;flex-wrap:wrap;}
  .tab-btn{padding:7px 14px;background:var(--surface);border:1px solid var(--border);border-radius:6px;color:var(--dim);font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:0.1em;cursor:pointer;transition:all 0.2s;}
  .tab-btn.active{background:rgba(78,201,176,0.1);border-color:rgba(78,201,176,0.32);color:var(--accent);}
  .tab-btn:hover:not(.active){border-color:rgba(255,255,255,0.14);color:var(--muted);}
  .tab-panel{display:none;animation:fadeUp 0.3s ease both;}
  .tab-panel.active{display:flex;flex-direction:column;gap:9px;}
  .issue-card{border-radius:8px;padding:14px;border-left-width:3px;border-left-style:solid;}
  .issue-header{display:flex;align-items:center;gap:8px;margin-bottom:7px;flex-wrap:wrap;}
  .severity-badge{font-size:8px;letter-spacing:0.14em;font-weight:700;padding:2px 7px;border-radius:3px;white-space:nowrap;}
  .issue-title{font-size:12px;font-weight:600;color:rgba(255,255,255,0.8);}
  .issue-detail{font-size:11px;color:rgba(255,255,255,0.4);line-height:1.65;}
  .strength-card{background:rgba(78,201,176,0.04);border:1px solid rgba(78,201,176,0.13);border-left:3px solid var(--accent);border-radius:8px;padding:12px 16px;display:flex;gap:10px;align-items:flex-start;}
  .strength-check{color:var(--accent);flex-shrink:0;}
  .strength-text{font-size:11px;color:rgba(255,255,255,0.58);line-height:1.65;}
  .qw-card{background:rgba(240,192,64,0.04);border:1px solid rgba(240,192,64,0.13);border-left:3px solid #f0c040;border-radius:8px;padding:12px 16px;display:flex;gap:10px;align-items:flex-start;}
  .qw-arrow{color:#f0c040;flex-shrink:0;}
  .empty-state{text-align:center;padding:40px;color:var(--dim);font-size:13px;}
  .site-footer{margin-top:48px;padding:16px 0;border-top:1px solid var(--border);text-align:center;font-size:10px;letter-spacing:0.1em;color:var(--dim);}
  /* Line number chips */
  .issue-lines{display:flex;flex-wrap:wrap;gap:4px;margin-top:9px;}
  .line-chip{font-size:9px;letter-spacing:0.04em;padding:2px 8px;border-radius:3px;background:rgba(255,255,255,0.06);color:rgba(255,255,255,0.45);font-family:'JetBrains Mono',monospace;border:1px solid rgba(255,255,255,0.08);}
  .line-chip-more{font-size:9px;letter-spacing:0.04em;padding:2px 8px;border-radius:3px;background:rgba(255,255,255,0.03);color:rgba(255,255,255,0.25);border:1px dashed rgba(255,255,255,0.08);}
  /* Status colour classes (dimension scores) */
  .status-excellent{color:#4ec9b0;} .fill-excellent{background:#4ec9b0;box-shadow:0 0 6px #4ec9b077;}
  .status-good     {color:#89d185;} .fill-good     {background:#89d185;box-shadow:0 0 6px #89d18577;}
  .status-fair     {color:#f0c040;} .fill-fair     {background:#f0c040;box-shadow:0 0 6px #f0c04077;}
  .status-poor     {color:#ff8c00;} .fill-poor     {background:#ff8c00;box-shadow:0 0 6px #ff8c0077;}
  .status-critical {color:#ff3b3b;} .fill-critical {background:#ff3b3b;box-shadow:0 0 6px #ff3b3b77;}
  /* Severity badge classes */
  .badge-critical  {color:#ff3b3b;background:rgba(255,59,59,0.1);}
  .badge-major     {color:#ff8c00;background:rgba(255,140,0,0.1);}
  .badge-minor     {color:#f0c040;background:rgba(240,192,64,0.1);}
  .badge-suggestion{color:#4ec9b0;background:rgba(78,201,176,0.1);}
  /* Issue card severity variants */
  .issue-card-critical  {background:rgba(255,59,59,0.08); border-color:rgba(255,59,59,0.16); border-left-color:#ff3b3b;}
  .issue-card-major     {background:rgba(255,140,0,0.08);  border-color:rgba(255,140,0,0.16); border-left-color:#ff8c00;}
  .issue-card-minor     {background:rgba(240,192,64,0.08); border-color:rgba(240,192,64,0.16);border-left-color:#f0c040;}
  .issue-card-suggestion{background:rgba(78,201,176,0.08); border-color:rgba(78,201,176,0.16);border-left-color:#4ec9b0;}
  /* Ring score colour classes (set via JS on the SVG and score text) */
  .ring-good{color:#4ec9b0;stroke:#4ec9b0;} .ring-fair{color:#f0c040;stroke:#f0c040;} .ring-poor{color:#ff8c00;stroke:#ff8c00;} .ring-bad{color:#ff3b3b;stroke:#ff3b3b;}
  .ring-wrap{position:relative;width:124px;height:124px;}
  .ring-svg-el{position:absolute;transform:rotate(-90deg);}
  /* Lang pill colour variants — replaces JS-injected style= */
  .lang-pill-js    {background:#f7df1e;color:#1a1a1a;}
  .lang-pill-python{background:#3572a5;color:#fff;}
  .lang-pill-java  {background:#b07219;color:#fff;}
  .lang-pill-html  {background:#e34c26;color:#fff;}
  /* Inline colour overrides — replaces style="color:..." on spans */
  .required-star{color:#ff3b3b;}
  .optional-note{color:var(--dim);}
  .badge-hidden{display:none;}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.38}}
  @keyframes scan{0%{transform:translateY(-5%)}100%{transform:translateY(105vh)}}
  @keyframes fadeUp{from{opacity:0;transform:translateY(9px)}to{opacity:1;transform:translateY(0)}}
  @media(max-width:640px){
    .grid2{grid-template-columns:1fr;}
    .score-card{grid-template-columns:1fr;}
    .score-right{border-left:none;border-top:1px solid var(--border);padding-left:0;padding-top:18px;}
  }
  /* Line number chips */
  .issue-lines{display:flex;flex-wrap:wrap;gap:4px;margin-top:9px;}
  .line-chip{font-size:9px;letter-spacing:0.04em;padding:2px 8px;border-radius:3px;background:rgba(255,255,255,0.06);color:rgba(255,255,255,0.42);font-family:'JetBrains Mono',monospace;border:1px solid rgba(255,255,255,0.08);}
  .line-chip-more{font-size:9px;padding:2px 8px;border-radius:3px;background:transparent;color:rgba(255,255,255,0.22);border:1px dashed rgba(255,255,255,0.07);}
</style>
</head>
<body>
<div class="wrap">
  <header class="header">
    <div class="header-badge">
      <div class="dot" aria-hidden="true"></div>
      <span class="badge-text">MULTI-LANGUAGE STATIC ANALYSIS &middot; 100% LOCAL</span>
    </div>
    <h1 class="logo">CodeReview<span>.</span></h1>
    <p class="tagline">JavaScript &middot; TypeScript &middot; Python &middot; Java &middot; HTML &nbsp;&middot;&nbsp; No data leaves your browser</p>
  </header>

  <main>
  <div id="input-panel">
    <nav class="lang-row" aria-label="Language selection">
      <span class="lang-label" id="lang-row-label">LANGUAGE:</span>
      <button class="lang-btn active" id="lang-auto" aria-pressed="true"  aria-describedby="lang-row-label">AUTO-DETECT</button>
      <button class="lang-btn"        id="lang-js"   aria-pressed="false" aria-describedby="lang-row-label">JavaScript / TS</button>
      <button class="lang-btn"        id="lang-python" aria-pressed="false" aria-describedby="lang-row-label">Python</button>
      <button class="lang-btn"        id="lang-java"   aria-pressed="false" aria-describedby="lang-row-label">Java</button>
      <button class="lang-btn"        id="lang-html"   aria-pressed="false" aria-describedby="lang-row-label">HTML</button>
      <span class="lang-detected badge-hidden" id="detected-badge" aria-live="polite"></span>
    </nav>
    <div class="grid2">
      <div>
        <label class="field-label" for="code-input">Source Code <span class="required-star" aria-label="required">*</span></label>
        <textarea id="code-input" placeholder="Paste your code here..." aria-required="true" aria-label="Source code to analyze"></textarea>
      </div>
      <div>
        <label class="field-label" for="docs-input">Documentation <span class="optional-note">(optional)</span></label>
        <textarea id="docs-input" placeholder="Paste README, API docs, or any associated documentation..." aria-label="Optional documentation for the code"></textarea>
      </div>
    </div>
    <button class="btn-analyze" id="analyze-btn" disabled aria-disabled="true">&#9654;&nbsp;&nbsp;ANALYZE CODE</button>
  </div>

  <section id="result-panel" aria-label="Analysis results">
    <div class="result-topbar">
      <div class="result-topbar-left">
        <span>ANALYSIS COMPLETE</span>
        <span class="lang-pill" id="result-lang-pill" aria-label="Detected language"></span>
      </div>
      <button class="btn-back" id="btn-back">&#8592; NEW REVIEW</button>
    </div>
    <div class="score-card" aria-label="Overall score">
      <div class="score-ring-wrap">
        <div class="ring-wrap" role="img" aria-labelledby="ring-score ring-grade" aria-describedby="summary-text">
          <svg class="ring-svg ring-svg-el" width="124" height="124" aria-hidden="true">
            <circle class="ring-bg" cx="62" cy="62" r="52"/>
            <circle class="ring-fg" id="ring-fg" cx="62" cy="62" r="52"/>
          </svg>
          <div class="ring-inner">
            <span class="ring-score" id="ring-score">0</span>
            <span class="ring-denom" aria-hidden="true">/100</span>
            <span class="ring-grade" id="ring-grade">-</span>
          </div>
        </div>
        <span class="ring-label" aria-hidden="true">OVERALL SCORE</span>
      </div>
      <div class="score-right">
        <div class="section-label" id="summary-label">SUMMARY</div>
        <div class="summary-text" id="summary-text" aria-labelledby="summary-label"></div>
        <div class="section-label" id="dimensions-label">DIMENSIONS</div>
        <div id="dimensions" aria-labelledby="dimensions-label"></div>
      </div>
    </div>
    <div class="tabs" role="tablist" aria-label="Results breakdown">
      <button class="tab-btn active" id="tab-issues"    role="tab" aria-selected="true"  aria-controls="panel-issues">ISSUES (<span id="issues-count">0</span>)</button>
      <button class="tab-btn"        id="tab-strengths" role="tab" aria-selected="false" aria-controls="panel-strengths">STRENGTHS (<span id="strengths-count">0</span>)</button>
      <button class="tab-btn"        id="tab-quickwins" role="tab" aria-selected="false" aria-controls="panel-quickwins">QUICK WINS (<span id="quickwins-count">0</span>)</button>
    </div>
    <div class="tab-panel active" id="panel-issues"    role="tabpanel" aria-labelledby="tab-issues"></div>
    <div class="tab-panel"        id="panel-strengths" role="tabpanel" aria-labelledby="tab-strengths"></div>
    <div class="tab-panel"        id="panel-quickwins" role="tabpanel" aria-labelledby="tab-quickwins"></div>
  </section>
  </main>
  <footer class="site-footer">
    <span>CodeReview. &mdash; 100% local &middot; no data leaves your browser</span>
  </footer>
</div>
<script>
// ── Shared utils ──────────────────────────────────────────────────────────
const clamp=v=>Math.max(0,Math.min(100,Math.round(v)));
const scoreStatus=s=>s>=80?'excellent':s>=65?'good':s>=50?'fair':s>=35?'poor':'critical';
const severityMeta={
  critical:  {label:'CRITICAL',   icon:'&#9940;'},
  major:     {label:'MAJOR',      icon:'&#9888;'},
  minor:     {label:'MINOR',      icon:'&#9889;'},
  suggestion:{label:'SUGGESTION', icon:'&#128161;'},
};
const langMeta={
  js:    {label:'JavaScript / TS'},
  python:{label:'Python'},
  java:  {label:'Java'},
  html:  {label:'HTML'},
};

// ── Line-tracking helpers ─────────────────────────────────────────────────
// Test each line against re, return 1-based line numbers (up to max).
function scanLines(linesArr, re, max=12){
  const nums=[];
  for(let i=0;i<linesArr.length&&nums.length<max;i++){
    if(re.test(linesArr[i])) nums.push(i+1);
  }
  return {count:nums.length, nums};
}

// Run regex across whole code string, map char offsets → 1-based line numbers.
// Only use for SAFE patterns (no [\s\S], no unbounded quantifiers).
function scanCode(code, re, max=12){
  const linesArr=code.split('\n');
  const offsets=[];let off=0;
  for(const l of linesArr){offsets.push(off);off+=l.length+1;}
  const seen=new Set(),nums=[];
  const r=new RegExp(re.source,(re.flags.includes('g')?re.flags:re.flags+'g'));
  let m;
  while((m=r.exec(code))!==null&&nums.length<max){
    let lo=0,hi=offsets.length-1;
    while(lo<hi){const mid=(lo+hi+1)>>1;if(offsets[mid]<=m.index)lo=mid;else hi=mid-1;}
    const ln=lo+1;
    if(!seen.has(ln)){seen.add(ln);nums.push(ln);}
  }
  return {count:nums.length,nums};
}

// Safely wrap any check that might hang on pathological input.
function safeRun(fn, fallback){try{return fn();}catch(e){return fallback;}}

// Detect nested for-loops line-by-line (safe, no backtracking).
// lang: 'py' uses indentation; 'c' uses brace counting.
function detectNestedLoops(linesArr, lang){
  const nums=[], FOR_PY=/^\s*for\s+\w+\s+in\s+/, FOR_C=/^\s*for\s*\(/;
  const forRe = lang==='py' ? FOR_PY : FOR_C;
  const indent=l=>(l.match(/^(\s*)/)||['',''])[1].length;
  linesArr.forEach((l,i)=>{
    if(!forRe.test(l))return;
    const baseIndent=indent(l);
    // scan subsequent lines at deeper indent for another for-loop
    for(let j=i+1;j<Math.min(i+60,linesArr.length);j++){
      const jl=linesArr[j];
      if(!jl.trim())continue;
      if(indent(jl)<=baseIndent)break; // back to same or outer level
      if(forRe.test(jl)){nums.push(i+1);break;}
    }
  });
  return {count:nums.length, nums:nums.slice(0,12)};
}

// Detect string += inside a Python for-loop body (safe, line-by-line).
function detectPyStrConcatInLoop(linesArr){
  const nums=[];
  const indent=l=>(l.match(/^(\s*)/)||['',''])[1].length;
  let inLoop=false, loopIndent=-1;
  linesArr.forEach((l,i)=>{
    if(!l.trim())return;
    const ind=indent(l);
    if(/^\s*for\s+\w+\s+in\s+/.test(l)){inLoop=true;loopIndent=ind;return;}
    if(inLoop){
      if(ind<=loopIndent){inLoop=false;return;}
      // string += inside loop body
      if(/\w+\s*\+=\s*["'f]/.test(l)&&!/#/.test(l.slice(0,l.indexOf('+=')))){
        nums.push(i+1);
      }
    }
  });
  return {count:nums.length, nums:nums.slice(0,12)};
}

// Detect DOM queries inside JS for-loops (safe, line-by-line).
function detectDomInLoop(linesArr){
  const nums=[];
  let depth=0, loopStart=-1;
  linesArr.forEach((l,i)=>{
    if(/\bfor\s*\(/.test(l)&&depth===0)loopStart=i;
    depth+=((l.match(/\{/g)||[]).length-(l.match(/\}/g)||[]).length);
    if(depth<0)depth=0;
    if(loopStart>=0&&/querySelector|getElementById|getElementsBy|document\./.test(l)){
      nums.push(i+1);
      loopStart=-1;
    }
    if(depth===0)loopStart=-1;
  });
  return {count:nums.length, nums:nums.slice(0,12)};
}

// Detect Java String+ in loop (safe, line-by-line brace tracking).
function detectJavaStrInLoop(linesArr){
  const nums=[];
  let depth=0, inLoop=false;
  linesArr.forEach((l,i)=>{
    if(/\bfor\s*\(/.test(l))inLoop=true;
    depth+=((l.match(/\{/g)||[]).length-(l.match(/\}/g)||[]).length);
    if(depth<0)depth=0;
    if(inLoop&&depth>0&&/String\b.*\+=|"\s*\+/.test(l))nums.push(i+1);
    if(depth===0)inLoop=false;
  });
  return {count:nums.length, nums:nums.slice(0,12)};
}

// Detect long function bodies by counting lines between braces (safe).
function detectLongFunctions(linesArr, maxLines=40){
  const nums=[];
  let depth=0, funcStart=-1, funcLine=-1;
  linesArr.forEach((l,i)=>{
    const opens=(l.match(/\{/g)||[]).length, closes=(l.match(/\}/g)||[]).length;
    if(opens>0&&depth===0){funcStart=i;funcLine=i+1;}
    depth+=opens-closes;
    if(depth<0)depth=0;
    if(depth===0&&funcStart>=0){
      if((i-funcStart)>maxLines)nums.push(funcLine);
      funcStart=-1;
    }
  });
  return {count:nums.length, nums:nums.slice(0,12)};
}

// Issue factory — lines is optional array of 1-based line numbers.
function iss(severity,title,detail,lines=[]){return{severity,title,detail,lines};}
function finalScore(dims,weights){return clamp(dims.reduce((s,d,i)=>s+d.score*weights[i],0));}
function grade(n){return n>=93?'A+':n>=88?'A':n>=83?'A-':n>=78?'B+':n>=73?'B':n>=68?'B-':n>=63?'C+':n>=58?'C':n>=53?'C-':n>=45?'D':'F';}
function buildSummary(totalLines,lang,dims,issues,strengths){
  const crit=issues.filter(i=>i.severity==='critical').length;
  const maj=issues.filter(i=>i.severity==='major').length;
  return `${totalLines} lines of ${lang} analyzed across ${dims.length} dimensions. `
    +(crit?`${crit} critical issue${crit>1?'s':''} require immediate attention. `:'')
    +(maj?`${maj} major issue${maj>1?'s':''} should be addressed. `:'')
    +(strengths.length>0?`${strengths.length} positive practices identified.`:'Significant improvements recommended.');
}

// ── Language detection ────────────────────────────────────────────────────
function detectLanguage(code){
  const s=code.slice(0,4000);
  const sc={js:0,python:0,java:0,html:0};
  if(/<!DOCTYPE\s+html/i.test(s))sc.html+=40;
  if(/<html[\s>]/i.test(s))sc.html+=20;
  if(/<\/?(div|span|p|a|img|head|body|script|style|link|meta|input|form|table|ul|li|h[1-6])\b/i.test(s))sc.html+=15;
  if(/^\s*def\s+\w+\s*\(/m.test(s))sc.python+=25;
  if(/^\s*import\s+\w+|^\s*from\s+\w+\s+import/m.test(s))sc.python+=20;
  if(/^\s*class\s+\w+.*:/m.test(s))sc.python+=15;
  if(/\bself\b/.test(s))sc.python+=15;
  if(/"""|'''/.test(s))sc.python+=10;
  if(/\bprint\s*\(/.test(s))sc.python+=8;
  if(/\bpublic\s+(class|interface|enum|abstract)\b/.test(s))sc.java+=30;
  if(/\bSystem\.out\.print/.test(s))sc.java+=15;
  if(/@Override|@Autowired|@Test|@Bean|@Component/.test(s))sc.java+=20;
  if(/import\s+java\./.test(s))sc.java+=25;
  if(/\bthrows\s+\w+/.test(s))sc.java+=10;
  if(/\b(const|let|var)\s+\w+\s*=/.test(s))sc.js+=20;
  if(/=>\s*[\{(]/.test(s))sc.js+=15;
  if(/\bconsole\.(log|warn|error)/.test(s))sc.js+=10;
  if(/\bfunction\s+\w+\s*\(/.test(s))sc.js+=10;
  if(/\b(interface|type)\s+\w+/.test(s))sc.js+=10;
  if(/document\.|window\.|querySelector/.test(s))sc.js+=10;
  if(sc.html<15)sc.html=0;
  return Object.entries(sc).sort((a,b)=>b[1]-a[1])[0][0];
}

// ── JavaScript / TypeScript ───────────────────────────────────────────────
function analyzeJS(code,docs){
  const lines=code.split('\n'),totalLines=lines.length;
  const nonEmpty=lines.filter(l=>l.trim());
  const issues=[],strengths=[];

  // 1. Commenting
  const cLines=lines.filter(l=>/^\s*(\/\/|\/\*|\*)/.test(l));
  const cRatio=cLines.length/Math.max(nonEmpty.length,1);
  const hasJsdoc=/\/\*\*[\s\S]*?\*\//.test(code);
  const todosR=scanLines(lines,/\/\/\s*(TODO|FIXME|HACK|XXX)/i);
  let commentScore=50;
  if(cRatio>=0.2){commentScore+=25;strengths.push(`Good comment density (${Math.round(cRatio*100)}% of lines).`);}
  else if(cRatio>=0.1){commentScore+=8;issues.push(iss('minor','Low comment density',`${Math.round(cRatio*100)}% comment ratio. Aim for 15–20%. Focus on explaining the 'why'.`));}
  else{commentScore-=15;issues.push(iss('major','Very sparse comments',`Only ${Math.round(cRatio*100)}% comments. Document complex logic, function intent, and non-obvious decisions.`));}
  if(hasJsdoc){commentScore+=15;strengths.push('JSDoc block comments detected — great for IDE tooling.');}
  if(todosR.count>0){commentScore-=5*Math.min(todosR.count,3);issues.push(iss('minor',`${todosR.count} unresolved TODO/FIXME`,'Resolve or move to an issue tracker.',todosR.nums));}
  if(docs&&docs.trim().length>100){commentScore+=10;strengths.push('External documentation provided.');}

  // 2. Maintainability
  const funcCount=scanCode(code,/function\s+\w+\s*\(|(?:const|let|var)\s+\w+\s*=\s*(?:async\s*)?(?:function|\()/g).count;
  const longFuncR=safeRun(()=>detectLongFunctions(lines,40),{count:0,nums:[]});
  const indLevels=nonEmpty.map(l=>{const m=l.match(/^(\s*)/);return m?m[1].replace(/\t/g,'  ').length/2:0;});
  const nestDepth=Math.max(0,...indLevels);
  const deepLines=lines.reduce((a,l,i)=>{const m=l.match(/^(\s*)/);if(m&&m[1].replace(/\t/g,'  ').length/2>=6)a.push(i+1);return a;},[]).slice(0,8);
  const magicR=scanLines(lines,/(?<![a-zA-Z_"'`])((?!0\b|1\b)[2-9]\d{2,})[^a-zA-Z_"'`.]/);
  let maintainScore=60;
  if(longFuncR.count>0){maintainScore-=10*Math.min(longFuncR.count,4);issues.push(iss(longFuncR.count>2?'major':'minor',`${longFuncR.count} overly long function body${longFuncR.count>1?'s':''}`,`Functions over ~40 lines are hard to read and test. Split into smaller single-responsibility functions.`,longFuncR.nums));}
  else if(funcCount>0){maintainScore+=15;strengths.push('Functions appear appropriately sized.');}
  if(nestDepth>6){maintainScore-=15;issues.push(iss('major',`Deep nesting (${nestDepth} levels)`,'Use early returns, guard clauses, or extract inner blocks into named functions.',deepLines));}
  else if(nestDepth>4){maintainScore-=5;issues.push(iss('minor',`Moderate nesting (${nestDepth} levels)`,'Consider early returns or extracted helpers.',deepLines));}
  else if(nestDepth>0){maintainScore+=10;strengths.push(`Shallow nesting (max ${nestDepth} levels).`);}
  if(magicR.count>0){maintainScore-=10;issues.push(iss('minor','Magic numbers present','Replace unexplained numeric literals with named constants.',magicR.nums));}

  // 3. Code Style
  const shortVarR=scanLines(lines,/\b(?:var|let|const)\s+[a-wyz]\s*[=;,)]/);
  const goodNaming=(code.match(/\b(?:get|set|handle|create|update|delete|fetch|parse|validate|format|render|build|init|load|save|is[A-Z]|has[A-Z])\w+/g)||[]).length;
  const mixedIndent=lines.some(l=>/^\t/.test(l))&&lines.some(l=>/^ {2}/.test(l));
  const longLineNums=lines.reduce((a,l,i)=>{if(l.length>120)a.push(i+1);return a;},[]);
  let styleScore=60;
  if(shortVarR.count>2){styleScore-=12;issues.push(iss('minor',`${shortVarR.count} single-character variable names`,"Short names like 'x','a' hurt readability. Use descriptive names (loop counters i/j/k excepted).",shortVarR.nums));}
  if(goodNaming>3){styleScore+=20;strengths.push(`Semantic naming (get/set/handle/validate…) — ${goodNaming} instances.`);}
  if(mixedIndent){styleScore-=10;issues.push(iss('minor','Mixed indentation (tabs + spaces)','Pick one style and enforce with Prettier or ESLint.'));}
  else{styleScore+=10;strengths.push('Consistent indentation throughout.');}
  if(longLineNums.length>5){styleScore-=8;issues.push(iss('minor',`${longLineNums.length} lines exceed 120 characters`,'Wrap long lines at 80–120 chars for readability.',longLineNums.slice(0,8)));}

  // 4. Error Handling
  const tryCatchR=scanCode(code,/try\s*\{/g);
  const emptyCatchR=scanCode(code,/catch\s*\([^)]*\)\s*\{\s*\}/g);
  const promiseCount=(code.match(/new Promise|\.then\s*\(|\.catch\s*\(|async\s+function|\bawait\s+/g)||[]).length;
  const unhandledAsync=promiseCount>0&&tryCatchR.count===0&&!/\.catch\s*\(/.test(code);
  let errorScore=50;
  if(tryCatchR.count>0){errorScore+=20;strengths.push(`${tryCatchR.count} try/catch block${tryCatchR.count>1?'s':''} present.`);}
  if(emptyCatchR.count>0){errorScore-=20;issues.push(iss('major',`${emptyCatchR.count} empty catch block${emptyCatchR.count>1?'s':''}`,`Swallowing errors makes debugging impossible. Log them at minimum.`,emptyCatchR.nums));}
  if(unhandledAsync){errorScore-=15;issues.push(iss('major','Async code without error handling','Add .catch() or try/catch around async operations. Unhandled rejections crash Node.js.'));}
  if(tryCatchR.count===0&&!unhandledAsync&&totalLines>30){errorScore-=8;issues.push(iss('minor','No explicit error handling','Wrap risky operations (I/O, parsing, network) in try/catch.'));}

  // 5. Extensibility
  const hasClasses=/\bclass\s+\w+/.test(code);
  const hasInterfaces=/\binterface\s+\w+|\btype\s+\w+\s*=\s*\{/.test(code);
  const hasModExports=/\bexport\s+(?:default\s+)?|\bmodule\.exports/.test(code);
  const hardUrlR=scanLines(lines,/https?:\/\/[^\s"'`<>)]+/);
  const hasConsts=/\bconst\s+[A-Z][A-Z0-9_]{2,}\s*=/.test(code);
  let extendScore=50;
  if(hasClasses){extendScore+=15;strengths.push('Class-based structure — promotes encapsulation.');}
  if(hasInterfaces){extendScore+=10;strengths.push('TypeScript interfaces/types — contract enforcement.');}
  if(hasModExports){extendScore+=10;strengths.push('Module exports — designed for reuse.');}
  if(hardUrlR.count>0){extendScore-=10;issues.push(iss('minor',`${hardUrlR.count} hardcoded URL${hardUrlR.count>1?'s':''}`,`Move URLs to config or environment variables.`,hardUrlR.nums));}
  if(hasConsts){extendScore+=10;strengths.push('Named constants (SCREAMING_SNAKE_CASE) found.');}

  // 6. Security
  const evalR=scanLines(lines,/\beval\s*\(/);
  const innerHtmlR=scanLines(lines,/\.innerHTML\s*=/);
  const dangerR=scanLines(lines,/dangerouslySetInnerHTML/);
  const sqlR=scanLines(lines,/['"`]\s*\+\s*(?:req\.|params\.|query\.|body\.)/);
  const secretR=scanLines(lines,/(?:password|api_?key|secret|token)\s*=\s*["'][^"']{4,}["']/i);
  const httpR=scanLines(lines,/http:\/\/(?!localhost|127\.)/);
  let securityScore=78;
  if(evalR.count>0){securityScore-=30;issues.push(iss('critical',`eval() used ${evalR.count} time${evalR.count>1?'s':''}`,`eval() is a critical XSS vector. Use JSON.parse() or refactor entirely.`,evalR.nums));}
  if(innerHtmlR.count>0){securityScore-=15;issues.push(iss('major',`${innerHtmlR.count} innerHTML assignment${innerHtmlR.count>1?'s':''}`,`innerHTML risks XSS. Use textContent or sanitize with DOMPurify.`,innerHtmlR.nums));}
  if(dangerR.count>0){securityScore-=10;issues.push(iss('major','dangerouslySetInnerHTML used','Only use with DOMPurify sanitization in React.',dangerR.nums));}
  if(sqlR.count>0){securityScore-=30;issues.push(iss('critical','SQL injection risk','Never concatenate user input into SQL. Use parameterized queries or an ORM.',sqlR.nums));}
  if(secretR.count>0){securityScore-=35;issues.push(iss('critical','Possible hardcoded credentials','Move secrets to environment variables. Rotate any exposed credentials immediately.',secretR.nums));}
  if(httpR.count>0){securityScore-=8;issues.push(iss('minor',`${httpR.count} non-HTTPS URL${httpR.count>1?'s':''}`,`Use HTTPS for all external resources.`,httpR.nums));}
  if(!evalR.count&&!innerHtmlR.count&&!sqlR.count&&!secretR.count){strengths.push('No obvious security anti-patterns detected.');}

  // 7. Performance
  const nestedLoopR=safeRun(()=>detectNestedLoops(lines,'c'),{count:0,nums:[]});
  const domInLoopR=safeRun(()=>detectDomInLoop(lines),{count:0,nums:[]});
  const syncR=scanLines(lines,/\bfs\.readFileSync|\bfs\.writeFileSync|\bexecSync\b/);
  const hasMemo=/\buseMemo\b|\buseCallback\b|\bmemo\s*\(|\bmemoize\b/i.test(code);
  const consoleR=scanLines(lines,/\bconsole\.log\s*\(/);
  let perfScore=72;
  if(nestedLoopR.count>0){perfScore-=15;issues.push(iss('minor','Nested loops detected','O(n²) complexity. Pre-index with Map/Set to achieve O(n).',nestedLoopR.nums));}
  if(domInLoopR.count>0){perfScore-=20;issues.push(iss('major','DOM query inside loop','Cache element references outside the loop to prevent layout thrashing.',domInLoopR.nums));}
  if(syncR.count>0){perfScore-=15;issues.push(iss('major',`${syncR.count} synchronous I/O operation${syncR.count>1?'s':''}`,`Sync I/O blocks the event loop. Replace with async alternatives.`,syncR.nums));}
  if(hasMemo){perfScore+=15;strengths.push('Memoization/caching patterns detected.');}
  if(consoleR.count>5){perfScore-=5;issues.push(iss('suggestion',`${consoleR.count} console.log statements`,'Remove debug logs before shipping, or use a configurable logging library.',consoleR.nums));}

  // 8. Testability
  const hasTests=/\bdescribe\s*\(|\bit\s*\(|\btest\s*\(|\bexpect\s*\(|\bassert\./.test(code);
  const hasMocks=/\bjest\.mock\b|\bsinon\.\b|\.mock\s*\(|\.stub\s*\(/.test(code);
  const globalRefR=scanLines(lines,/\b(?:document|window|process|global)\./);
  let testScore=40;
  if(hasTests){testScore+=35;strengths.push('Test code detected — regression protection in place.');}
  else{issues.push(iss('suggestion','No tests found','Add unit tests with Jest, Vitest, or Mocha for core logic.'));}
  if(hasMocks){testScore+=15;strengths.push('Test mocks/stubs — dependencies are isolated.');}
  if(globalRefR.count>6){testScore-=10;issues.push(iss('suggestion','High global-scope coupling',`${globalRefR.count} lines reference global objects. Consider dependency injection.`,globalRefR.nums));}

  const dims=[
    {name:'Commenting & Docs',score:clamp(commentScore), status:scoreStatus(commentScore)},
    {name:'Maintainability',  score:clamp(maintainScore),status:scoreStatus(maintainScore)},
    {name:'Code Style',       score:clamp(styleScore),   status:scoreStatus(styleScore)},
    {name:'Error Handling',   score:clamp(errorScore),   status:scoreStatus(errorScore)},
    {name:'Extensibility',    score:clamp(extendScore),  status:scoreStatus(extendScore)},
    {name:'Security',         score:clamp(securityScore),status:scoreStatus(securityScore)},
    {name:'Performance',      score:clamp(perfScore),    status:scoreStatus(perfScore)},
    {name:'Testability',      score:clamp(testScore),    status:scoreStatus(testScore)},
  ];
  const weights=[0.15,0.20,0.10,0.15,0.10,0.15,0.10,0.05];
  const overall=finalScore(dims,weights);
  const qw=[
    ...(todosR.count>0?[`Resolve the ${todosR.count} TODO/FIXME comment${todosR.count>1?'s':''}`]:[]),
    ...(emptyCatchR.count>0?['Add logging to empty catch blocks']:[]),
    ...(magicR.count>0?['Extract magic numbers into named constants']:[]),
    ...(!hasTests&&totalLines>20?['Add at least one unit test for core logic']:[]),
    ...(hardUrlR.count>0?['Move hardcoded URLs to config/env']:[]),
    ...(!hasJsdoc&&funcCount>2?['Add JSDoc to exported functions']:[]),
    ...(consoleR.count>5?['Remove debug console.log statements']:[]),
  ].slice(0,6);
  return{overallScore:overall,grade:grade(overall),summary:buildSummary(totalLines,'JavaScript/TypeScript',dims,issues,strengths),dimensions:dims,strengths,issues,quickWins:qw};
}

// ── Python ────────────────────────────────────────────────────────────────

  if(todosR.count>0){commentScore-=5;issues.push(iss('minor',`${todosR.count} unresolved TODO/FIXME`,'Move stale TODOs to an issue tracker.',todosR.nums));}
  if(docs&&docs.trim().length>100){commentScore+=8;strengths.push('External documentation provided.');}

  const funcDefsR=scanLines(lines,/^\s*def\s+\w+/);

  else{maintainScore+=10;strengths.push(`Shallow nesting (max ${nestDepth} levels) — Pythonic structure.`);}
  if(magicR.count>0){maintainScore-=10;issues.push(iss('minor','Magic numbers in code','Extract numeric literals to named module-level constants.',magicR.nums));}

  if(funcDefsR.count>0){strengths.push(`${funcDefsR.count} function definition${funcDefsR.count>1?'s':''} found.`);}

  if(hasAbstract){extendScore+=10;strengths.push('Abstract methods — interface contracts enforced.');}
  if(decoR.count>1){extendScore+=8;strengths.push(`${decoR.count} decorators — Pythonic behaviour extension.`);}
  if(hardUrlR.count>0){extendScore-=10;issues.push(iss('minor',`${hardUrlR.count} hardcoded URL${hardUrlR.count>1?'s':''}`,`Use os.environ or a config file.`,hardUrlR.nums));}

  const evalR=scanLines(lines,/\beval\s*\(/);
  const execR=scanLines(lines,/\bexec\s*\(/);
  const osSysR=scanLines(lines,/\bos\.system\s*\(/);
  const shellTrueR=scanLines(lines,/subprocess\.[a-z_]+\s*\([^)]*shell\s*=\s*True/);
  const pickleR=scanLines(lines,/\bpickle\.loads?\s*\(/);
  const sqlR=scanLines(lines,/(?:execute|query)\s*\(.*["%].*%|f["'].*SELECT.*\{/i);
  const secretR=scanLines(lines,/(?:password|passwd|api_?key|secret|token)\s*=\s*["'][^"']{4,}["']/i);
  let securityScore=75;
  if(evalR.count>0){securityScore-=30;issues.push(iss('critical',`eval() called ${evalR.count} time${evalR.count>1?'s':''}`,`Use ast.literal_eval() for safe parsing or redesign the logic.`,evalR.nums));}
  if(execR.count>0){securityScore-=25;issues.push(iss('critical',`exec() called ${execR.count} time${execR.count>1?'s':''}`,`exec() is as dangerous as eval(). Refactor to explicit logic.`,execR.nums));}
  if(osSysR.count>0){securityScore-=20;issues.push(iss('major',`os.system() called ${osSysR.count} time${osSysR.count>1?'s':''}`,`Use subprocess.run() with a list of args and shell=False.`,osSysR.nums));}
  if(shellTrueR.count>0){securityScore-=20;issues.push(iss('major','subprocess with shell=True','shell=True opens shell injection vulnerabilities. Pass args as a list with shell=False.',shellTrueR.nums));}
  if(pickleR.count>0){securityScore-=20;issues.push(iss('major','pickle.load/loads detected','Deserialising untrusted pickle data allows arbitrary code execution. Use JSON instead.',pickleR.nums));}
  if(sqlR.count>0){securityScore-=30;issues.push(iss('critical','SQL injection via string formatting','Use parameterised queries with your DB driver.',sqlR.nums));}
  if(secretR.count>0){securityScore-=35;issues.push(iss('critical','Possible hardcoded credentials','Move secrets to environment variables. Rotate any exposed credentials immediately.',secretR.nums));}
  if(!evalR.count&&!execR.count&&!osSysR.count&&!shellTrueR.count&&!sqlR.count&&!secretR.count){strengths.push('No obvious security anti-patterns detected.');}

  const strConcatR=safeRun(()=>detectPyStrConcatInLoop(lines),{count:0,nums:[]});
  const nestedLoopR=safeRun(()=>detectNestedLoops(lines,'py'),{count:0,nums:[]});
  const globalR=scanLines(lines,/\bglobal\s+\w+/);
  const usesNumpy=/import\s+numpy|from\s+numpy/.test(code);
  const usesGens=/\byield\b|\(.*for\s+\w+\s+in/.test(code);
  let perfScore=68;
  if(strConcatR.count>0){perfScore-=20;issues.push(iss('major','String concatenation inside loop',"Use a list and ''.join(parts) instead — significantly faster.",strConcatR.nums));}
  if(nestedLoopR.count>0){perfScore-=12;issues.push(iss('minor','Nested loops detected','O(n²) complexity. Consider dict lookups or NumPy vectorisation.',nestedLoopR.nums));}
  if(globalR.count>2){perfScore-=10;issues.push(iss('minor',`${globalR.count} global variable uses`,'Pass values as parameters or use class attributes instead.',globalR.nums));}
  if(usesNumpy){perfScore+=15;strengths.push('NumPy — vectorised operations significantly faster than Python loops.');}
  if(usesGens){perfScore+=10;strengths.push('Generators used — memory-efficient iteration.');}

  const hasUnittest=/import\s+unittest|\bTestCase\b/.test(code);
  const hasPytest=/import\s+pytest|\bpytest\b|def\s+test_/.test(code);
  const hasMocks=/from\s+unittest\.mock|import\s+mock|\bMagicMock\b|\bpatch\b/.test(code);
  const assertR=scanLines(lines,/\bassert\s+/);
  let testScore=40;
  if(hasUnittest||hasPytest){testScore+=35;strengths.push(`${hasUnittest?'unittest':'pytest'} detected — regression protection in place.`);}
  else{issues.push(iss('suggestion','No test framework found','Add pytest tests in test_*.py files.'));}
  if(hasMocks){testScore+=15;strengths.push('unittest.mock — external dependencies isolated in tests.');}
  if(assertR.count>3){testScore+=5;strengths.push(`${assertR.count} assert statements — inline contract checking.`);}

  const dims=[
    {name:'Commenting & Docs', score:clamp(commentScore), status:scoreStatus(commentScore)},
    {name:'Maintainability',   score:clamp(maintainScore),status:scoreStatus(maintainScore)},
    {name:'Code Style (PEP8)', score:clamp(styleScore),   status:scoreStatus(styleScore)},
    {name:'Error Handling',    score:clamp(errorScore),   status:scoreStatus(errorScore)},
    {name:'Extensibility',     score:clamp(extendScore),  status:scoreStatus(extendScore)},
    {name:'Security',          score:clamp(securityScore),status:scoreStatus(securityScore)},
    {name:'Performance',       score:clamp(perfScore),    status:scoreStatus(perfScore)},
    {name:'Testability',       score:clamp(testScore),    status:scoreStatus(testScore)},
  ];
  const weights=[0.15,0.20,0.10,0.15,0.10,0.15,0.10,0.05];
  const overall=finalScore(dims,weights);
  const qw=[
    ...(bareExceptR.count>0?['Replace bare except: with specific exception types']:[]),
    ...(exceptPassR.count>0?['Add logging to silent except…pass blocks']:[]),
    ...(!hasDocstrings?['Add docstrings to modules and public functions']:[]),
    ...(tabR.count>0?['Convert tab indentation to 4 spaces (PEP 8)']:[]),
    ...(!hasTypeHints?['Add type hints to function signatures']:[]),
    ...(secretR.count>0?['Move credentials to environment variables immediately']:[]),
    ...(strConcatR.count>0?["Replace string += in loop with list + ''.join()"]:[]),
  ].slice(0,6);
  return{overallScore:overall,grade:grade(overall),summary:buildSummary(totalLines,'Python',dims,issues,strengths),dimensions:dims,strengths,issues,quickWins:qw};
}

// ── Java ──────────────────────────────────────────────────────────────────
function analyzeJava(code,docs){
  const lines=code.split('\n'),totalLines=lines.length;
  const nonEmpty=lines.filter(l=>l.trim());
  const issues=[],strengths=[];

  const cLines=lines.filter(l=>/^\s*(\/\/|\/\*|\*)/.test(l));
  const cRatio=cLines.length/Math.max(nonEmpty.length,1);
  const hasJavadoc=/\/\*\*[\s\S]*?\*\//.test(code);
  const hasMethodDoc=/\/\*\*[\s\S]*?\*\/\s*(?:public|private|protected)/.test(code);
  const todosR=scanLines(lines,/\/\/\s*(TODO|FIXME|HACK|XXX)/i);
  let commentScore=50;
  if(cRatio>=0.2){commentScore+=25;strengths.push(`Good comment density (${Math.round(cRatio*100)}% of lines).`);}
  else if(cRatio>=0.1){commentScore+=8;issues.push(iss('minor','Low comment density',`Only ${Math.round(cRatio*100)}% comments. Aim for 15–20% on public APIs.`));}
  else{commentScore-=15;issues.push(iss('major','Sparse comments','Document class purpose, method contracts, and non-obvious logic.'));}
  if(hasJavadoc){commentScore+=15;strengths.push('Javadoc comments present.');}
  if(hasMethodDoc){commentScore+=5;strengths.push('Public method Javadoc — API contracts documented.');}
  if(todosR.count>0){commentScore-=5;issues.push(iss('minor',`${todosR.count} unresolved TODO/FIXME`,'Move to your issue tracker.',todosR.nums));}
  if(docs&&docs.trim().length>100){commentScore+=8;strengths.push('External documentation provided.');}

  const longMethodR=safeRun(()=>detectLongFunctions(lines,30),{count:0,nums:[]});
  const indLevels=nonEmpty.map(l=>{const m=l.match(/^(\s*)/);return m?m[1].replace(/\t/g,'    ').length/4:0;});
  const nestDepth=Math.max(0,...indLevels);
  const deepLines=lines.reduce((a,l,i)=>{const m=l.match(/^(\s*)/);if(m&&m[1].replace(/\t/g,'    ').length/4>=6)a.push(i+1);return a;},[]).slice(0,8);
  const magicR=scanLines(lines,/(?<![a-zA-Z_"'])((?!0\b|1\b)[2-9]\d{2,})[^a-zA-Z_"'.]/);
  const printR=scanLines(lines,/System\.out\.print(?:ln|f)?\s*\(/);
  let maintainScore=60;
  if(longMethodR.count>0){maintainScore-=10*Math.min(longMethodR.count,3);issues.push(iss(longMethodR.count>2?'major':'minor',`${longMethodR.count} potentially long method${longMethodR.count>1?'s':''}`,`Refactor long methods into smaller, single-responsibility helpers.`,longMethodR.nums));}
  else{maintainScore+=15;strengths.push('Methods appear appropriately sized.');}
  if(nestDepth>6){maintainScore-=15;issues.push(iss('major',`Deep nesting (${nestDepth} levels)`,'Flatten with guard clauses or extracted private methods.',deepLines));}
  else if(nestDepth>4){maintainScore-=5;issues.push(iss('minor',`Moderate nesting (${nestDepth} levels)`,'Consider guard clauses or extracting nested blocks.',deepLines));}
  else{maintainScore+=10;strengths.push(`Shallow nesting (max ${nestDepth} levels).`);}
  if(magicR.count>0){maintainScore-=10;issues.push(iss('minor','Magic numbers present','Define as: private static final int NAME = value;',magicR.nums));}
  if(printR.count>3){maintainScore-=8;issues.push(iss('minor',`${printR.count} System.out.print statements`,'Use SLF4J + Logback/Log4j2 for production logging.',printR.nums));}

  const badClassR=scanLines(lines,/\bclass\s+[a-z]\w*/);
  const hasConsts=/\bprivate\s+static\s+final\b|\bpublic\s+static\s+final\b/.test(code);
  const usesGenerics=/List<|Map<|Set<|Optional<|Collection</.test(code);
  const longLineNums=lines.reduce((a,l,i)=>{if(l.length>120)a.push(i+1);return a;},[]);
  let styleScore=60;
  if(badClassR.count>0){styleScore-=15;issues.push(iss('major',`${badClassR.count} class${badClassR.count>1?'es':''} not in PascalCase`,'Java class names must start uppercase.',badClassR.nums));}
  if(hasConsts){styleScore+=15;strengths.push('Static final constants — named constants improve maintainability.');}
  if(usesGenerics){styleScore+=10;strengths.push('Generics — type-safe collections reduce ClassCastException risk.');}
  if(longLineNums.length>5){styleScore-=8;issues.push(iss('minor',`${longLineNums.length} lines exceed 120 characters`,'Wrap long lines for readability.',longLineNums.slice(0,8)));}

  const tryCatchR=scanCode(code,/\btry\s*\{/g);
  const emptyCatchR=scanCode(code,/catch\s*\([^)]*\)\s*\{\s*\}/g);
  const catchThrowR=scanLines(lines,/catch\s*\(\s*Throwable\s+/);
  const catchExceptR=scanLines(lines,/catch\s*\(\s*Exception\s+/);
  const stackTraceR=scanLines(lines,/\.printStackTrace\s*\(\s*\)/);
  const throwsR=scanLines(lines,/\bthrows\s+\w+/);
  let errorScore=50;
  if(tryCatchR.count>0){errorScore+=15;strengths.push(`${tryCatchR.count} try/catch block${tryCatchR.count>1?'s':''}.`);}
  if(emptyCatchR.count>0){errorScore-=25;issues.push(iss('critical',`${emptyCatchR.count} empty catch block${emptyCatchR.count>1?'s':''}`,`Empty catch silently swallows exceptions. Log or re-throw with context.`,emptyCatchR.nums));}
  if(catchThrowR.count>0){errorScore-=15;issues.push(iss('major','Catching Throwable','Includes OutOfMemoryError. Catch Exception or specific types instead.',catchThrowR.nums));}
  if(catchExceptR.count>0){errorScore-=8;issues.push(iss('minor',`${catchExceptR.count} broad catch(Exception)`,'Catch the most specific exception type you expect.',catchExceptR.nums));}
  if(stackTraceR.count>0){errorScore-=10;issues.push(iss('minor',`${stackTraceR.count} printStackTrace() call${stackTraceR.count>1?'s':''}`,`Use log.error("context", e) via SLF4J instead.`,stackTraceR.nums));}
  if(throwsR.count>0){strengths.push(`${throwsR.count} throws declaration${throwsR.count>1?'s':''} — checked exception contracts declared.`);}

  const ifaceR=scanLines(lines,/\binterface\s+\w+/);
  const abstractR=scanLines(lines,/\babstract\s+class\b|\babstract\s+\w+\s+\w+\s*\(/);
  const annotR=scanLines(lines,/@(?:Override|Autowired|Component|Service|Repository|Controller|Bean|Test|Before|After)\b/);
  const usesDI=/@Autowired|@Inject/.test(code);
  const hardUrlR=scanLines(lines,/https?:\/\/[^\s"']+/);
  const usesBuilder=/\.builder\(\)|Builder\s+\w+\s*=/.test(code);
  let extendScore=50;
  if(ifaceR.count>0){extendScore+=20;strengths.push(`${ifaceR.count} interface${ifaceR.count>1?'s':''} — dependency inversion supported.`);}
  if(abstractR.count>0){extendScore+=12;strengths.push('Abstract classes/methods — template method pattern.');}
  if(usesDI){extendScore+=15;strengths.push('Dependency injection — loosely coupled, testable architecture.');}
  if(annotR.count>2){extendScore+=8;strengths.push(`${annotR.count} framework annotations.`);}
  if(usesBuilder){extendScore+=8;strengths.push('Builder pattern — clean complex object construction.');}
  if(hardUrlR.count>0){extendScore-=10;issues.push(iss('minor',`${hardUrlR.count} hardcoded URL${hardUrlR.count>1?'s':''}`,`Externalise to application.properties or environment variables.`,hardUrlR.nums));}

  const sqlR=scanLines(lines,/(?:executeQuery|executeUpdate|prepareStatement|createStatement)\s*\([^)]*\+/);
  const runtimeR=scanLines(lines,/Runtime\.getRuntime\s*\(\s*\)\.exec|ProcessBuilder/);
  const secretR=scanLines(lines,/(?:password|passwd|apiKey|secretKey|token)\s*=\s*["'][^"']{4,}["']/i);
  const xmlR=scanLines(lines,/DocumentBuilderFactory|SAXParserFactory/);
  const xmlUnsafe=xmlR.count>0&&!/setFeature.*DISALLOW_DOCTYPE|setFeature.*XMLConstants/.test(code);
  const serialR=scanLines(lines,/implements\s+Serializable/);
  let securityScore=75;
  if(sqlR.count>0){securityScore-=35;issues.push(iss('critical','SQL injection — query string concatenation','Use PreparedStatement with parameterized queries.',sqlR.nums));}
  if(runtimeR.count>0){securityScore-=20;issues.push(iss('major','Runtime.exec() / ProcessBuilder','OS command injection risk. Validate all inputs.',runtimeR.nums));}
  if(secretR.count>0){securityScore-=35;issues.push(iss('critical','Possible hardcoded credentials','Use Spring @Value, environment variables, or a secrets manager.',secretR.nums));}
  if(xmlUnsafe){securityScore-=20;issues.push(iss('major','XML parser may be vulnerable to XXE','Disable external entity processing: factory.setFeature(XMLConstants.FEATURE_SECURE_PROCESSING, true)',xmlR.nums));}
  if(serialR.count>0&&!code.includes('serialVersionUID')){securityScore-=5;issues.push(iss('minor','Serializable missing serialVersionUID','Add: private static final long serialVersionUID = 1L;',serialR.nums));}
  if(!sqlR.count&&!secretR.count&&!runtimeR.count){strengths.push('No obvious security issues detected.');}

  const strLoopR=safeRun(()=>detectJavaStrInLoop(lines),{count:0,nums:[]});
  const usesSB=/StringBuilder|StringBuffer/.test(code);
  const nestedLoopR=scanCode(code,/for\s*\([^)]+\)[^{]*\{[^{}]*for\s*\(/g);
  const tryResR=scanCode(code,/try\s*\([^)]+\)/g);
  const hasStream=/\.stream\s*\(\)|Stream\.</.test(code);
  const resourceR=scanLines(lines,/new\s+(?:FileInputStream|FileOutputStream|Connection|PreparedStatement|BufferedReader)\s*\(/);
  let perfScore=68;
  if(strLoopR.count>0&&!usesSB){perfScore-=20;issues.push(iss('major','String + inside loop','Use StringBuilder.append() for O(n) performance.',strLoopR.nums));}
  if(usesSB){strengths.push('StringBuilder/StringBuffer — efficient string construction.');}
  if(nestedLoopR.count>0){perfScore-=12;issues.push(iss('minor','Nested loops detected','O(n²). Consider HashMap lookups or stream operations.',nestedLoopR.nums));}
  if(tryResR.count>0){perfScore+=15;strengths.push('try-with-resources — resources automatically closed, preventing leaks.');}
  else if(resourceR.count>0){perfScore-=15;issues.push(iss('major','Resources may not be closed','Use try-with-resources to guarantee closure.',resourceR.nums));}
  if(hasStream){perfScore+=10;strengths.push('Java Streams API — declarative, parallelizable data processing.');}

  const hasJunit=/@Test\b|import\s+org\.junit/.test(code);
  const hasMockito=/import\s+org\.mockito|\bMockito\b|\b@Mock\b/.test(code);
  const hasAssertions=/assertEquals|assertTrue|assertNotNull|assertThat/.test(code);
  let testScore=40;
  if(hasJunit){testScore+=30;strengths.push('JUnit test annotations detected.');}
  else{issues.push(iss('suggestion','No JUnit tests found','Add @Test methods in src/test/java using JUnit 5 and AssertJ.'));}
  if(hasMockito){testScore+=20;strengths.push('Mockito — dependencies mocked for isolated unit tests.');}
  if(hasAssertions){testScore+=10;strengths.push('Assertions present.');}
  if(usesDI){testScore+=5;strengths.push('DI architecture — dependencies easily swapped with mocks.');}

  const dims=[
    {name:'Commenting & Docs', score:clamp(commentScore), status:scoreStatus(commentScore)},
    {name:'Maintainability',   score:clamp(maintainScore),status:scoreStatus(maintainScore)},
    {name:'Code Style',        score:clamp(styleScore),   status:scoreStatus(styleScore)},
    {name:'Error Handling',    score:clamp(errorScore),   status:scoreStatus(errorScore)},
    {name:'Extensibility',     score:clamp(extendScore),  status:scoreStatus(extendScore)},
    {name:'Security',          score:clamp(securityScore),status:scoreStatus(securityScore)},
    {name:'Performance',       score:clamp(perfScore),    status:scoreStatus(perfScore)},
    {name:'Testability',       score:clamp(testScore),    status:scoreStatus(testScore)},
  ];
  const weights=[0.15,0.20,0.10,0.15,0.10,0.15,0.10,0.05];
  const overall=finalScore(dims,weights);
  const qw=[
    ...(emptyCatchR.count>0?['Add logging to empty catch blocks']:[]),
    ...(stackTraceR.count>0?['Replace printStackTrace() with logger.error("msg", e)']:[]),
    ...(magicR.count>0?['Define magic numbers as static final constants']:[]),
    ...(printR.count>3?['Replace System.out with SLF4J logging']:[]),
    ...(!hasJunit?['Add JUnit 5 tests in src/test/java']:[]),
    ...(sqlR.count>0?['Use PreparedStatement for all SQL queries']:[]),
    ...(secretR.count>0?['Move credentials to application.properties or env vars']:[]),
  ].slice(0,6);
  return{overallScore:overall,grade:grade(overall),summary:buildSummary(totalLines,'Java',dims,issues,strengths),dimensions:dims,strengths,issues,quickWins:qw};
}

// ── HTML ──────────────────────────────────────────────────────────────────
function analyzeHTML(code,docs){
  const lines=code.split('\n'),totalLines=lines.length;
  const htmlOnly=code
    .replace(/<script[\s\S]*?<\/script>/gi,'<!-- script removed -->')
    .replace(/<style[\s\S]*?<\/style>/gi,'<!-- style removed -->');
  const hoLines=htmlOnly.split('\n');
  const issues=[],strengths=[];

  function tagLines(re,max=10){return scanLines(hoLines,re,max);}

  // 1. Structure
  const hasDoctype=/<!DOCTYPE\s+html\s*>/i.test(code);
  const hasLang=/<html[^>]+lang\s*=\s*["'][a-z]/.test(code);
  const hasCharset=/<meta[^>]+charset/i.test(code);
  const hasViewport=/<meta[^>]+viewport/i.test(code);
  const hasTitle=/<title>[^<]+<\/title>/i.test(code);
  const hasMetaDesc=/<meta[^>]+name\s*=\s*["']description["']/i.test(code);
  const hasMain=/<main[\s>]/i.test(htmlOnly);
  const hasSemantics=/<header[\s>]/i.test(htmlOnly)&&/<footer[\s>]/i.test(htmlOnly)&&/<nav[\s>]/i.test(htmlOnly);
  let structScore=40;
  if(hasDoctype){structScore+=15;strengths.push('DOCTYPE html — correct HTML5 document type.');}
  else{issues.push(iss('critical','Missing DOCTYPE html','Without DOCTYPE browsers enter quirks mode. Add <!DOCTYPE html> as line 1.',[1]));}
  if(hasLang){structScore+=10;strengths.push('lang attribute on html element — critical for screen readers.');}
  else{const r=tagLines(/<html[\s>]/i);issues.push(iss('major','Missing lang on html element','Add lang="en" to <html>. Screen readers use this for pronunciation.',r.nums));}
  if(hasCharset){structScore+=8;strengths.push('meta charset declared.');}
  else{issues.push(iss('major','Missing meta charset','Add <meta charset="UTF-8"> as first element in <head>.'));}
  if(hasViewport){structScore+=8;strengths.push('Viewport meta — responsive layout configured.');}
  else{issues.push(iss('major','Missing viewport meta','Add <meta name="viewport" content="width=device-width, initial-scale=1">.'));}
  if(hasTitle){structScore+=8;strengths.push('title tag present.');}
  else{issues.push(iss('major','Missing title tag','Every page needs a descriptive <title> element.'));}
  if(hasMain){structScore+=5;strengths.push('main landmark element — good document structure.');}
  if(hasSemantics){structScore+=5;strengths.push('Semantic structure: header, nav, footer present.');}

  // 2. Accessibility
  const imgTagLines=[],imgNoAltLines=[];
  hoLines.forEach((l,i)=>{
    if(/<img\b/i.test(l)){imgTagLines.push(i+1);if(!/\balt\s*=/.test(l))imgNoAltLines.push(i+1);}
  });
  const ariaR=tagLines(/aria-label\s*=|aria-labelledby\s*=|aria-describedby\s*=/);
  const roleR=tagLines(/\brole\s*=\s*["']/);
  const tabPosR=tagLines(/tabindex\s*=\s*["'][1-9]/);
  const headings=[];for(let i=1;i<=6;i++){if(new RegExp('<h'+i+'[\\s>]','i').test(htmlOnly))headings.push(i);}
  const headingSkip=headings.some((h,i)=>i>0&&h-headings[i-1]>1);
  let accessScore=40;
  if(imgNoAltLines.length>0){accessScore-=15;issues.push(iss('major',`${imgNoAltLines.length} image${imgNoAltLines.length>1?'s':''} missing alt text`,'All img need alt. Use descriptive text for informational images, alt="" for decorative.',imgNoAltLines));}
  else if(imgTagLines.length>0){accessScore+=15;strengths.push(`All ${imgTagLines.length} image${imgTagLines.length>1?'s':''} have alt attributes.`);}
  if(ariaR.count>0){accessScore+=10;strengths.push(`${ariaR.count} ARIA label${ariaR.count>1?'s':''} — assistive technology support.`);}
  if(roleR.count>0){accessScore+=8;strengths.push(`${roleR.count} ARIA role${roleR.count>1?'s':''} — semantic roles for screen readers.`);}
  if(tabPosR.count>0){accessScore-=10;issues.push(iss('minor',`${tabPosR.count} positive tabindex values`,'Positive tabindex disrupts natural tab order. Use tabindex="0" or -1.',tabPosR.nums));}
  if(headingSkip){const h1R=tagLines(/<h1[\s>]/i);issues.push(iss('minor','Heading hierarchy skips levels','Use sequential levels (h1→h2→h3). Screen reader users navigate by headings.',h1R.nums));}
  else if(headings.length>0){accessScore+=10;strengths.push(`Sequential heading hierarchy: ${headings.map(h=>'h'+h).join(' → ')}.`);}

  // 3. Performance
  const inlineStyleR=tagLines(/\bstyle\s*=\s*["'][^"']{20,}["']/);
  const scriptSrcLines=[],noAsyncDeferLines=[];
  lines.forEach((l,i)=>{
    if(/<script[^>]+src[^>]*>/i.test(l)){scriptSrcLines.push(i+1);if(!/async|defer/i.test(l))noAsyncDeferLines.push(i+1);}
  });
  const largeB64R=tagLines(/src\s*=\s*["']data:image\/[^;]+;base64,[A-Za-z0-9+/]{5000,}/);
  let perfScore=65;
  if(inlineStyleR.count>3){perfScore-=12;issues.push(iss('minor',`${inlineStyleR.count} elements with heavy inline styles`,'Move to CSS classes for caching and maintainability.',inlineStyleR.nums));}
  if(noAsyncDeferLines.length>0){perfScore-=15;issues.push(iss('major',`${noAsyncDeferLines.length} render-blocking script${noAsyncDeferLines.length>1?'s':''}`,`Add defer (ordered) or async (independent) to external script tags.`,noAsyncDeferLines));}
  else if(scriptSrcLines.length>0){perfScore+=10;strengths.push('External scripts use async or defer — non-blocking.');}
  if(largeB64R.count>0){perfScore-=15;issues.push(iss('major',`${largeB64R.count} large inline base64 image${largeB64R.count>1?'s':''}`,`Large base64 images bloat HTML. Serve as separate files for browser caching.`,largeB64R.nums));}

  // 4. SEO
  const hasOg=/<meta[^>]+property\s*=\s*["']og:/.test(code);
  const hasCanonical=/<link[^>]+rel\s*=\s*["']canonical["']/.test(code);
  const h1Lines=[];hoLines.forEach((l,i)=>{if(/<h1[\s>]/i.test(l))h1Lines.push(i+1);});
  const hasLdJson=/<script[^>]+type\s*=\s*["']application\/ld\+json["']/.test(code);
  let seoScore=50;
  if(hasMetaDesc){seoScore+=15;strengths.push('Meta description — shown in search results.');}
  else{issues.push(iss('minor','Missing meta description','Add <meta name="description" content="..."> (150–160 chars).'));}
  if(h1Lines.length>0){seoScore+=10;strengths.push('h1 heading — primary topic defined for search engines.');}
  else{issues.push(iss('minor','No h1 element','Every page should have exactly one h1.'));}
  if(h1Lines.length>1){seoScore-=10;issues.push(iss('minor','Multiple h1 elements','Use only one h1. Use h2–h6 for subheadings.',h1Lines));}
  if(hasOg){seoScore+=10;strengths.push('Open Graph tags — rich social media sharing.');}
  if(hasCanonical){seoScore+=8;strengths.push('Canonical URL — prevents duplicate content.');}
  if(hasLdJson){seoScore+=10;strengths.push('JSON-LD structured data — enables rich search results.');}

  // 5. Security
  const inlineEvtR=tagLines(/\bon\w+\s*=\s*["'][^"']+["']/);
  const httpResR=tagLines(/(?:src|href|action)\s*=\s*["']http:\/\/(?!localhost|127\.)/);
  const formNoMethodLines=[];
  hoLines.forEach((l,i)=>{if(/<form\b/i.test(l)&&!/method\s*=/i.test(l))formNoMethodLines.push(i+1);});
  const blankNoRelLines=[];
  hoLines.forEach((l,i)=>{if(/target\s*=\s*["']_blank["']/i.test(l)&&!/rel\s*=\s*["'][^"']*noopener/i.test(l))blankNoRelLines.push(i+1);});
  let securityScore=70;
  if(inlineEvtR.count>3){securityScore-=15;issues.push(iss('minor',`${inlineEvtR.count} inline event handler${inlineEvtR.count>1?'s':''}`,`Inline onclick/onload conflict with Content Security Policy. Use addEventListener() in JS.`,inlineEvtR.nums));}
  if(httpResR.count>0){securityScore-=20;issues.push(iss('major',`${httpResR.count} non-HTTPS resource${httpResR.count>1?'s':''}`,`HTTP resources are blocked on HTTPS pages (mixed content).`,httpResR.nums));}
  if(formNoMethodLines.length>0){securityScore-=8;issues.push(iss('minor',`${formNoMethodLines.length} form${formNoMethodLines.length>1?'s':''} without explicit method`,`Forms default to GET, appending data to URL. Set method="post" for sensitive data.`,formNoMethodLines));}
  if(blankNoRelLines.length>0){securityScore-=8;issues.push(iss('minor','_blank links without rel="noopener"','Add rel="noopener noreferrer" to prevent reverse tabnapping.',blankNoRelLines));}
  if(!inlineEvtR.count&&!httpResR.count){strengths.push('No inline event handlers or insecure HTTP resources.');}

  // 6. Maintainability
  const deprecatedR=tagLines(/<(?:font|center|marquee|blink|strike|tt|big)\b/i);
  const commentedR=scanLines(hoLines,/<!--[\s\S]*?<\w+/);
  const allIds=[];hoLines.forEach((l,i)=>{const m=l.match(/\bid\s*=\s*["']([^"']+)["']/i);if(m)allIds.push({id:m[1],line:i+1});});
  const idMap={},dupIdLines=[];
  allIds.forEach(({id,line})=>{if(idMap[id])dupIdLines.push(line);else idMap[id]=line;});
  const inlineStyleCountR=tagLines(/\bstyle\s*=\s*["']/);
  let maintainScore=60;
  if(deprecatedR.count>0){maintainScore-=15;issues.push(iss('major',`${deprecatedR.count} deprecated HTML tag${deprecatedR.count>1?'s':''}`,`Tags like font, center, marquee are obsolete. Use CSS.`,deprecatedR.nums));}
  else{strengths.push('No deprecated HTML tags found.');}
  if(commentedR.count>2){maintainScore-=8;issues.push(iss('minor',`${commentedR.count} blocks of commented-out HTML`,'Delete unused markup — version control preserves history.',commentedR.nums));}
  if(dupIdLines.length>0){maintainScore-=20;issues.push(iss('critical',`${dupIdLines.length} duplicate id attribute${dupIdLines.length>1?'s':''}`,`IDs must be unique. Duplicates break CSS, querySelector, and accessibility labels.`,dupIdLines));}
  if(inlineStyleCountR.count===0){maintainScore+=15;strengths.push('No inline style attributes — clean separation of concerns.');}
  else if(inlineStyleCountR.count>10){maintainScore-=10;issues.push(iss('minor',`${inlineStyleCountR.count} inline style attributes`,'Move to CSS classes.',inlineStyleCountR.nums.slice(0,8)));}

  const dims=[
    {name:'Document Structure',score:clamp(structScore),  status:scoreStatus(structScore)},
    {name:'Accessibility',     score:clamp(accessScore),  status:scoreStatus(accessScore)},
    {name:'Performance',       score:clamp(perfScore),    status:scoreStatus(perfScore)},
    {name:'SEO',               score:clamp(seoScore),     status:scoreStatus(seoScore)},
    {name:'Security',          score:clamp(securityScore),status:scoreStatus(securityScore)},
    {name:'Maintainability',   score:clamp(maintainScore),status:scoreStatus(maintainScore)},
  ];
  const weights=[0.20,0.25,0.15,0.15,0.15,0.10];
  const overall=finalScore(dims,weights);
  const qw=[
    ...(!hasDoctype?['Add <!DOCTYPE html> as the very first line']:[]),
    ...(!hasLang?['Add lang="en" to the html element']:[]),
    ...(imgNoAltLines.length>0?[`Add alt text to ${imgNoAltLines.length} image${imgNoAltLines.length>1?'s':''}`]:[]),
    ...(noAsyncDeferLines.length>0?['Add defer or async to external script tags']:[]),
    ...(dupIdLines.length>0?['Fix duplicate id attributes — IDs must be unique']:[]),
    ...(blankNoRelLines.length>0?['Add rel="noopener noreferrer" to _blank links']:[]),
    ...(!hasMetaDesc?['Add a meta description tag']:[]),
    ...(httpResR.count>0?['Upgrade HTTP resource URLs to HTTPS']:[]),
  ].slice(0,6);
  return{overallScore:overall,grade:grade(overall),summary:buildSummary(totalLines,'HTML',dims,issues,strengths),dimensions:dims,strengths,issues,quickWins:qw};
}

// ── Dispatcher ────────────────────────────────────────────────────────────
function analyzeCode(code,docs,forceLang){
  const lang=forceLang==='auto'?detectLanguage(code):forceLang;
  let r;
  if(lang==='python')r=analyzePython(code,docs);
  else if(lang==='java')r=analyzeJava(code,docs);
  else if(lang==='html')r=analyzeHTML(code,docs);
  else r=analyzeJS(code,docs);
  r.lang=lang;
  return r;
}

// ── UI state ──────────────────────────────────────────────────────────────
let selectedLang='auto';

function setLang(lang){
  selectedLang=lang;
  document.querySelectorAll('.lang-btn').forEach(b=>{
    b.classList.remove('active');b.setAttribute('aria-pressed','false');
  });
  const active=document.getElementById('lang-'+lang);
  active.classList.add('active');active.setAttribute('aria-pressed','true');
  updateBadge();
}
function updateBadge(){
  const code=document.getElementById('code-input').value;
  const badge=document.getElementById('detected-badge');
  if(selectedLang==='auto'&&code.trim().length>50){
    badge.textContent='Detected: '+langMeta[detectLanguage(code)].label;
    badge.classList.remove('badge-hidden');
  }else{badge.classList.add('badge-hidden');}
}
function onCodeInput(){
  const v=document.getElementById('code-input').value;
  const empty=v.trim().length===0;
  document.getElementById('code-input').classList.toggle('has-value',!empty);
  const btn=document.getElementById('analyze-btn');
  btn.disabled=empty;btn.setAttribute('aria-disabled',String(empty));
  updateBadge();
}
function onDocsInput(){
  const v=document.getElementById('docs-input').value;
  document.getElementById('docs-input').classList.toggle('has-value',v.trim().length>0);
}
function resetUI(){
  document.getElementById('result-panel').style.display='none';
  document.getElementById('input-panel').style.display='block';
  ['code-input','docs-input'].forEach(id=>{
    document.getElementById(id).value='';
    document.getElementById(id).classList.remove('has-value');
  });
  const btn=document.getElementById('analyze-btn');
  btn.disabled=true;btn.setAttribute('aria-disabled','true');
  document.getElementById('detected-badge').classList.add('badge-hidden');
}
function switchTab(name){
  ['issues','strengths','quickwins'].forEach(t=>{
    const on=t===name;
    document.getElementById('tab-'+t).classList.toggle('active',on);
    document.getElementById('tab-'+t).setAttribute('aria-selected',String(on));
    document.getElementById('panel-'+t).classList.toggle('active',on);
  });
}

// Render line number chips under an issue card
function lineChipsHTML(nums){
  if(!nums||!nums.length)return'';
  const MAX=8;
  const shown=nums.slice(0,MAX);
  const extra=nums.length-shown.length;
  let h='<div class="issue-lines">';
  shown.forEach(n=>{h+='<span class="line-chip">L'+n+'</span>';});
  if(extra>0)h+='<span class="line-chip-more">+'+extra+' more</span>';
  return h+'</div>';
}

function runAnalysis(){
  const code=document.getElementById('code-input').value;
  const docs=document.getElementById('docs-input').value;
  if(!code.trim())return;

  const r=analyzeCode(code,docs,selectedLang);
  document.getElementById('input-panel').style.display='none';
  document.getElementById('result-panel').style.display='block';

  // Lang pill
  const m=langMeta[r.lang]||langMeta.js;
  const pill=document.getElementById('result-lang-pill');
  pill.textContent=m.label;pill.className='lang-pill lang-pill-'+r.lang;

  // Ring animation
  const C=2*Math.PI*52;
  const fg=document.getElementById('ring-fg');
  const ringCls=r.overallScore>=80?'ring-good':r.overallScore>=60?'ring-fair':r.overallScore>=40?'ring-poor':'ring-bad';
  ['ring-good','ring-fair','ring-poor','ring-bad'].forEach(c=>{fg.classList.remove(c);});
  fg.classList.add(ringCls);
  fg.style.strokeDasharray=C;fg.style.strokeDashoffset=C;
  const scoreEl=document.getElementById('ring-score');
  const gradeEl=document.getElementById('ring-grade');
  ['ring-good','ring-fair','ring-poor','ring-bad'].forEach(c=>{scoreEl.classList.remove(c);gradeEl.classList.remove(c);});
  scoreEl.classList.add(ringCls);gradeEl.classList.add(ringCls);
  gradeEl.textContent=r.grade;
  let start=null;
  function anim(ts){
    if(!start)start=ts;
    const p=Math.min((ts-start)/1200,1),e=1-Math.pow(1-p,3);
    scoreEl.textContent=Math.round(e*r.overallScore);
    fg.style.strokeDashoffset=C-e*(r.overallScore/100)*C;
    if(p<1)requestAnimationFrame(anim);
  }
  requestAnimationFrame(anim);

  document.getElementById('summary-text').textContent=r.summary;

  // Dimension bars
  const dimEl=document.getElementById('dimensions');
  dimEl.innerHTML='';
  r.dimensions.forEach((d,i)=>{
    const s=d.status;
    const div=document.createElement('div');
    div.className='dim-bar';
    div.innerHTML='<div class="dim-bar-top"><span class="dim-name">'+d.name+'</span><span class="dim-score status-'+s+'">'+d.score+'</span></div><div class="dim-track"><div class="dim-fill fill-'+s+'" id="fill-'+i+'"></div></div>';
    dimEl.appendChild(div);
    setTimeout(()=>{const el=document.getElementById('fill-'+i);if(el)el.style.width=d.score+'%';},80+i*70);
  });

  document.getElementById('issues-count').textContent=r.issues.length;
  document.getElementById('strengths-count').textContent=r.strengths.length;
  document.getElementById('quickwins-count').textContent=r.quickWins.length;

  function renderCards(panelId,items,emptyMsg,renderItem){
    const el=document.getElementById(panelId);
    el.innerHTML='';
    if(!items.length){el.innerHTML='<div class="empty-state">'+emptyMsg+'</div>';return;}
    items.forEach(item=>{const d=document.createElement('div');renderItem(d,item);el.appendChild(d);});
  }

  renderCards('panel-issues',r.issues,'No issues found! &#127881;',(d,issue)=>{
    const sev=issue.severity||'minor';
    const mv=severityMeta[sev]||severityMeta.minor;
    d.className='issue-card issue-card-'+sev;
    d.innerHTML=
      '<div class="issue-header">'+
        '<span aria-hidden="true">'+mv.icon+'</span>'+
        '<span class="severity-badge badge-'+sev+'">'+mv.label+'</span>'+
        '<span class="issue-title">'+issue.title+'</span>'+
      '</div>'+
      '<div class="issue-detail">'+issue.detail+'</div>'+
      lineChipsHTML(issue.lines);
  });
  renderCards('panel-strengths',r.strengths,'No strengths identified yet.',(d,s)=>{
    d.className='strength-card';
    d.innerHTML='<span class="strength-check">&#10003;</span><span class="strength-text">'+s+'</span>';
  });
  renderCards('panel-quickwins',r.quickWins,'No quick wins — code looks solid! &#128640;',(d,w)=>{
    d.className='qw-card';
    d.innerHTML='<span class="qw-arrow">&#8594;</span><span class="strength-text">'+w+'</span>';
  });

  switchTab('issues');
}

// ── Event wiring (no inline handlers) ────────────────────────────────────
document.addEventListener('DOMContentLoaded',function(){
  document.getElementById('lang-auto').addEventListener('click',function(){setLang('auto');});
  document.getElementById('lang-js').addEventListener('click',function(){setLang('js');});
  document.getElementById('lang-python').addEventListener('click',function(){setLang('python');});
  document.getElementById('lang-java').addEventListener('click',function(){setLang('java');});
  document.getElementById('lang-html').addEventListener('click',function(){setLang('html');});
  document.getElementById('code-input').addEventListener('input',onCodeInput);
  document.getElementById('docs-input').addEventListener('input',onDocsInput);
  document.getElementById('analyze-btn').addEventListener('click',runAnalysis);
  document.getElementById('btn-back').addEventListener('click',resetUI);
  document.getElementById('tab-issues').addEventListener('click',function(){switchTab('issues');});
  document.getElementById('tab-strengths').addEventListener('click',function(){switchTab('strengths');});
  document.getElementById('tab-quickwins').addEventListener('click',function(){switchTab('quickwins');});
});

</script>
